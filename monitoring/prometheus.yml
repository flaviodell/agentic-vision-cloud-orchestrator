global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # CV inference service — running on Lambda (metrics not available from Lambda)
  # For local monitoring, run cv_service manually: docker run -p 8000:8000 vision-inference-service
  - job_name: "cv_service"
    static_configs:
      - targets: ["host.docker.internal:8000"]
    metrics_path: /metrics/

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]